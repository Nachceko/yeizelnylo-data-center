<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理控制台</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e0e0e0;
    }

    .dashboard-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .logout-button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #ff4d4f;
      background: transparent;
      border: 2px solid #ff4d4f;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-button:hover {
      background: rgba(255, 77, 79, 0.1);
    }

    .warning-banner {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.1) 0%, rgba(255, 152, 0, 0.1) 100%);
      border: 2px solid #ffc107;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(255, 193, 7, 0.2);
    }

    .warning-icon {
      font-size: 32px;
      flex-shrink: 0;
    }

    .warning-content {
      flex: 1;
    }

    .warning-title {
      font-size: 18px;
      font-weight: 700;
      color: #ff8f00;
      margin: 0 0 8px 0;
    }

    .warning-text {
      font-size: 15px;
      color: #e65100;
      margin: 0;
      line-height: 1.6;
    }

    .warning-text strong {
      font-weight: 700;
      font-size: 16px;
    }

    .message {
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 8px;
      font-size: 14px;
      animation: slideIn 0.3s ease;
    }

    .message-success {
      background: rgba(82, 196, 26, 0.1);
      border: 1px solid rgba(82, 196, 26, 0.3);
      color: #52c41a;
    }

    .message-error {
      background: rgba(255, 77, 79, 0.1);
      border: 1px solid rgba(255, 77, 79, 0.3);
      color: #ff4d4f;
    }

    .message-warning {
      background: rgba(250, 173, 20, 0.1);
      border: 1px solid rgba(250, 173, 20, 0.3);
      color: #faad14;
    }

    .message-info {
      background: rgba(24, 144, 255, 0.1);
      border: 1px solid rgba(24, 144, 255, 0.3);
      color: #1890ff;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dashboard-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .info-card,
    .github-token-card,
    .file-manager-card {
      padding: 24px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0 0 16px 0;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .info-label {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .token-display {
      flex: 1;
      padding: 8px 12px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #667eea;
      word-break: break-all;
    }

    .copy-button {
      padding: 6px 12px;
      font-size: 13px;
      color: #667eea;
      background: transparent;
      border: 1px solid #667eea;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-button:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .info-hint {
      font-size: 13px;
      color: #999;
      margin: 0;
    }

    .token-hint {
      font-size: 13px;
      color: #666;
      margin: 0 0 12px 0;
    }

    .token-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .token-input {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      background: #f5f5f5;
      color: #333;
      outline: none;
    }

    .token-input:focus {
      border-color: #667eea;
      background: #fff;
    }

    .token-save-btn {
      padding: 10px 16px;
      font-size: 14px;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .token-save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }

    .token-clear-btn {
      padding: 10px 16px;
      font-size: 14px;
      color: #ff4d4f;
      background: transparent;
      border: 2px solid #ff4d4f;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .token-clear-btn:hover {
      background: rgba(255, 77, 79, 0.1);
    }

    .token-status {
      font-size: 13px;
      color: #52c41a;
      margin: 0;
    }

    .mode-switcher {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-btn {
      flex: 1;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .mode-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-color: #667eea;
    }

    .mode-btn .mode-icon {
      font-size: 20px;
      display: block;
      margin-bottom: 4px;
    }

    .github-config {
      display: none;
    }

    .github-config.active {
      display: block;
    }

    .local-config {
      display: none;
    }

    .local-config.active {
      display: block;
    }

    .local-hint {
      font-size: 13px;
      color: #666;
      margin: 0 0 12px 0;
    }

    .local-path-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      background: #f5f5f5;
      color: #333;
      outline: none;
      margin-bottom: 8px;
    }

    .local-path-input:focus {
      border-color: #667eea;
      background: #fff;
    }

    .local-load-btn {
      padding: 10px 16px;
      font-size: 14px;
      color: #fff;
      background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .local-load-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(82, 196, 26, 0.4);
    }

    .file-manager-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      min-height: 500px;
    }

    .file-tree-panel {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .file-tree-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f5f7fa;
      border-bottom: 1px solid #e0e0e0;
      font-weight: 600;
      font-size: 14px;
    }

    .refresh-btn {
      padding: 4px 12px;
      font-size: 12px;
      color: #667eea;
      background: transparent;
      border: 1px solid #667eea;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover:not(:disabled) {
      background: rgba(102, 126, 234, 0.1);
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .file-tree {
      max-height: 450px;
      overflow-y: auto;
      padding: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 2px 0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .file-item:hover {
      background: #f5f7fa;
    }

    .file-item.active {
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
    }

    .file-item-child {
      padding-left: 28px;
    }

    .file-icon {
      font-size: 16px;
    }

    .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    .file-editor-panel {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .editor-empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      color: #999;
      font-size: 16px;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f5f7fa;
      border-bottom: 1px solid #e0e0e0;
    }

    .editor-file-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .editor-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 6px 12px;
      font-size: 13px;
      color: #333;
      background: transparent;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: #f5f7fa;
    }

    .action-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-color: #667eea;
    }

    .save-btn {
      color: #52c41a;
      border-color: #52c41a;
    }

    .save-btn:hover {
      background: rgba(82, 196, 26, 0.1);
    }

    .close-btn {
      color: #ff4d4f;
      border-color: #ff4d4f;
    }

    .close-btn:hover {
      background: rgba(255, 77, 79, 0.1);
    }

    .editor-content {
      flex: 1;
      min-height: 400px;
    }

    .markdown-editor {
      width: 100%;
      height: 100%;
      min-height: 400px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: vertical;
      background: #fff;
      color: #333;
    }

    .markdown-preview {
      height: 100%;
      min-height: 400px;
      padding: 16px;
      overflow-y: auto;
    }

    .preview-content {
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .file-manager-layout {
        grid-template-columns: 1fr;
      }
      
      .token-input-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="dashboard-header">
      <h1 class="dashboard-title">管理控制台</h1>
      <button class="logout-button" id="logoutBtn">退出登录</button>
    </div>

    <div class="warning-banner">
      <div class="warning-icon">⚠️</div>
      <div class="warning-content">
        <h3 class="warning-title">重要安全提示</h3>
        <p class="warning-text">
          <strong>不再使用或换设备登录时，请务必手动点击"退出登录"按钮删除本地存储的密钥，避免密钥泄漏！</strong>
        </p>
      </div>
    </div>

    <div id="messageBox" class="message" style="display: none;"></div>

    <div class="dashboard-content">
      <div class="info-card">
        <h2 class="card-title">当前会话信息</h2>
        <div class="info-item">
          <span class="info-label">访问密钥：</span>
          <code class="token-display" id="tokenDisplay"></code>
          <button class="copy-button" id="copyBtn">复制</button>
        </div>
        <p class="info-hint">
          此密钥保存在浏览器本地存储中，退出登录后将自动清除。
        </p>
      </div>

      <div class="github-token-card">
        <h2 class="card-title">文件管理模式</h2>
        
        <div class="mode-switcher">
          <button class="mode-btn active" id="githubModeBtn">
            <span class="mode-icon">🐙</span>
            GitHub Token 模式
          </button>
          <button class="mode-btn" id="localModeBtn">
            <span class="mode-icon">💻</span>
            本地开发模式
          </button>
        </div>

        <div class="github-config active" id="githubConfig">
          <p class="token-hint">
            请输入具有仓库写入权限的 GitHub Personal Access Token 以管理文件
          </p>
          <div class="token-input-group">
            <input
              type="password"
              class="token-input"
              id="githubTokenInput"
              placeholder="输入 GitHub Token (ghp_xxx 或 github_pat_xxx)"
            />
            <button class="token-save-btn" id="saveGithubTokenBtn">保存并加载</button>
            <button class="token-clear-btn" id="clearGithubTokenBtn" style="display: none;">清除</button>
          </div>
          <p class="token-status" id="tokenStatus" style="display: none;">✅ Token 已配置</p>
        </div>

        <div class="local-config" id="localConfig">
          <p class="local-hint">
            本地开发模式：直接编辑本地项目中的文件，无需 GitHub Token
          </p>
          <div class="token-input-group">
            <input
              type="text"
              class="local-path-input"
              id="localPathInput"
              placeholder="本地项目路径 (如: d:\hexo\YeizelNylo-WebSite)"
            />
            <button class="local-load-btn" id="loadLocalBtn">加载本地文件</button>
            <button class="token-clear-btn" id="clearLocalPathBtn" style="display: none;">清除</button>
          </div>
          <p class="token-status" id="localStatus" style="display: none;">✅ 本地路径已配置</p>
        </div>
      </div>

      <div class="file-manager-card">
        <h2 class="card-title">📂 Guide 文件管理</h2>
        
        <div class="file-manager-layout">
          <div class="file-tree-panel">
            <div class="file-tree-header">
              <span>文件目录</span>
              <button class="refresh-btn" id="refreshBtn">刷新</button>
            </div>
            
            <div id="fileTreeContainer">
              <div class="empty-state">请先配置 GitHub Token</div>
            </div>
          </div>

          <div class="file-editor-panel">
            <div id="editorEmptyState" class="editor-empty-state">
              <p>📝 选择左侧文件进行编辑</p>
            </div>
            
            <div id="editorContent" style="display: none;">
              <div class="editor-header">
                <div class="editor-file-info">
                  <span class="editor-file-icon">📝</span>
                  <span class="editor-file-name" id="editorFileName"></span>
                </div>
                <div class="editor-actions">
                  <button class="action-btn active" id="editModeBtn">编辑</button>
                  <button class="action-btn" id="previewModeBtn">预览</button>
                  <button class="action-btn save-btn" id="saveFileBtn">保存</button>
                  <button class="action-btn close-btn" id="closeEditorBtn">关闭</button>
                </div>
              </div>

              <div class="editor-content">
                <textarea
                  class="markdown-editor"
                  id="markdownEditor"
                  placeholder="在此编辑 Markdown 内容..."
                ></textarea>
                
                <div class="markdown-preview" id="markdownPreview" style="display: none;">
                  <div class="preview-content" id="previewContent"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const repoOwner = 'Nachceko';
    const repoName = 'yeizelnylo-data-center';
    const branch = 'main';

    let token = '';
    let githubToken = '';
    let localPath = '';
    let currentMode = 'github'; // 'github' or 'local'
    let files = [];
    let selectedFile = '';
    let fileContent = '';
    let originalContent = '';
    let isEditing = false;
    let previewMode = false;

    const tokenDisplay = document.getElementById('tokenDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const githubModeBtn = document.getElementById('githubModeBtn');
    const localModeBtn = document.getElementById('localModeBtn');
    const githubConfig = document.getElementById('githubConfig');
    const localConfig = document.getElementById('localConfig');
    const githubTokenInput = document.getElementById('githubTokenInput');
    const saveGithubTokenBtn = document.getElementById('saveGithubTokenBtn');
    const clearGithubTokenBtn = document.getElementById('clearGithubTokenBtn');
    const tokenStatus = document.getElementById('tokenStatus');
    const localPathInput = document.getElementById('localPathInput');
    const loadLocalBtn = document.getElementById('loadLocalBtn');
    const clearLocalPathBtn = document.getElementById('clearLocalPathBtn');
    const localStatus = document.getElementById('localStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const fileTreeContainer = document.getElementById('fileTreeContainer');
    const editorEmptyState = document.getElementById('editorEmptyState');
    const editorContent = document.getElementById('editorContent');
    const editorFileName = document.getElementById('editorFileName');
    const markdownEditor = document.getElementById('markdownEditor');
    const markdownPreview = document.getElementById('markdownPreview');
    const previewContent = document.getElementById('previewContent');
    const editModeBtn = document.getElementById('editModeBtn');
    const previewModeBtn = document.getElementById('previewModeBtn');
    const saveFileBtn = document.getElementById('saveFileBtn');
    const closeEditorBtn = document.getElementById('closeEditorBtn');
    const messageBox = document.getElementById('messageBox');

    function init() {
      const storedToken = localStorage.getItem('admin_token');
      const storedGithubToken = localStorage.getItem('github_token');
      const storedLocalPath = localStorage.getItem('local_path');
      const storedMode = localStorage.getItem('file_mode') || 'github';

      if (!storedToken) {
        window.location.href = '/admin/login.html';
        return;
      }

      token = storedToken;
      tokenDisplay.textContent = token;
      currentMode = storedMode;

      if (currentMode === 'github') {
        githubModeBtn.classList.add('active');
        localModeBtn.classList.remove('active');
        githubConfig.classList.add('active');
        localConfig.classList.remove('active');
        
        if (storedGithubToken) {
          githubToken = storedGithubToken;
          githubTokenInput.value = githubToken;
          clearGithubTokenBtn.style.display = 'inline-block';
          tokenStatus.style.display = 'block';
          loadFiles();
        }
      } else {
        localModeBtn.classList.add('active');
        githubModeBtn.classList.remove('active');
        localConfig.classList.add('active');
        githubConfig.classList.remove('active');
        
        if (storedLocalPath) {
          localPath = storedLocalPath;
          localPathInput.value = localPath;
          clearLocalPathBtn.style.display = 'inline-block';
          localStatus.style.display = 'block';
          loadLocalFiles();
        }
      }
    }

    function showMessage(type, text) {
      messageBox.className = 'message message-' + type;
      messageBox.textContent = text;
      messageBox.style.display = 'block';
      setTimeout(() => {
        messageBox.style.display = 'none';
      }, 3000);
    }

    async function loadFiles() {
      if (!githubToken) {
        showMessage('error', '请先输入 GitHub Token');
        return;
      }

      refreshBtn.disabled = true;
      refreshBtn.textContent = '加载中...';

      try {
        const response = await fetch(
          `https://api.github.com/repos/${repoOwner}/${repoName}/contents/docs/guide?ref=${branch}`,
          {
            headers: {
              'Authorization': `Bearer ${githubToken}`,
              'Accept': 'application/vnd.github.v3+json'
            }
          }
        );

        if (!response.ok) {
          throw new Error('获取文件列表失败');
        }

        files = await response.json();
        renderFileTree();
        showMessage('success', '文件列表加载成功');
      } catch (error) {
        showMessage('error', '加载文件失败：' + error.message);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = '刷新';
      }
    }

    function renderFileTree() {
      if (currentMode === 'github' && !githubToken) {
        fileTreeContainer.innerHTML = '<div class="empty-state">请先配置 GitHub Token</div>';
        return;
      }
      if (currentMode === 'local' && !localPath) {
        fileTreeContainer.innerHTML = '<div class="empty-state">请输入本地项目路径</div>';
        return;
      }

      if (files.length === 0) {
        fileTreeContainer.innerHTML = '<div class="empty-state">点击"刷新"加载文件</div>';
        return;
      }

      let html = '<div class="file-tree">';
      
      files.forEach(file => {
        html += `
          <div class="file-item ${selectedFile === file.path ? 'active' : ''}" data-path="${file.path}" data-type="${file.type}">
            <span class="file-icon">${getFileIcon(file)}</span>
            <span class="file-name">${file.name}</span>
          </div>
        `;

        if (file.children) {
          file.children.forEach(child => {
            html += `
              <div class="file-item file-item-child ${selectedFile === child.path ? 'active' : ''}" data-path="${child.path}" data-type="${child.type}">
                <span class="file-icon">${getFileIcon(child)}</span>
                <span class="file-name">${child.name}</span>
              </div>
            `;
          });
        }
      });

      html += '</div>';
      fileTreeContainer.innerHTML = html;

      document.querySelectorAll('.file-item').forEach(item => {
        item.addEventListener('click', () => {
          const path = item.dataset.path;
          const type = item.dataset.type;
          const file = findFileByPath(path);
          if (file) {
            if (currentMode === 'github') {
              openFile(file);
            } else {
              openLocalFile(file);
            }
          }
        });
      });
    }

    function findFileByPath(path) {
      for (const file of files) {
        if (file.path === path) return file;
        if (file.children) {
          for (const child of file.children) {
            if (child.path === path) return child;
          }
        }
      }
      return null;
    }

    function getFileIcon(file) {
      if (file.type === 'dir') return '📁';
      if (file.name.endsWith('.md')) return '📝';
      return '📄';
    }

    async function openFile(file) {
      if (file.type === 'dir') {
        await loadSubDirectory(file);
        return;
      }

      if (!file.path.endsWith('.md')) {
        showMessage('warning', '只能编辑 Markdown 文件');
        return;
      }

      try {
        const response = await fetch(file.url, {
          headers: {
            'Authorization': `Bearer ${githubToken}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!response.ok) {
          throw new Error('获取文件内容失败');
        }

        const data = await response.json();
        const binaryString = atob(data.content);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const content = new TextDecoder('utf-8').decode(bytes);

        selectedFile = file.path;
        fileContent = content;
        originalContent = content;
        isEditing = true;
        previewMode = false;

        editorFileName.textContent = file.path;
        markdownEditor.value = content;
        editorEmptyState.style.display = 'none';
        editorContent.style.display = 'block';
        markdownEditor.style.display = 'block';
        markdownPreview.style.display = 'none';
        editModeBtn.classList.add('active');
        previewModeBtn.classList.remove('active');

        renderFileTree();
      } catch (error) {
        showMessage('error', '打开文件失败：' + error.message);
      }
    }

    async function loadSubDirectory(dir) {
      if (dir.children) return;

      try {
        const response = await fetch(
          `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${dir.path}?ref=${branch}`,
          {
            headers: {
              'Authorization': `Bearer ${githubToken}`,
              'Accept': 'application/vnd.github.v3+json'
            }
          }
        );

        if (response.ok) {
          dir.children = await response.json();
          renderFileTree();
        }
      } catch (error) {
        console.error('加载子目录失败:', error);
      }
    }

    async function saveFile() {
      if (!selectedFile || !githubToken) return;

      saveFileBtn.disabled = true;
      saveFileBtn.textContent = '保存中...';

      try {
        const response = await fetch(
          `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${selectedFile}`,
          {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${githubToken}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: `Update ${selectedFile} via admin panel`,
              content: btoa(unescape(encodeURIComponent(fileContent))),
              branch: branch
            })
          }
        );

        if (!response.ok) {
          throw new Error('保存文件失败');
        }

        originalContent = fileContent;
        showMessage('success', '文件保存成功');
      } catch (error) {
        showMessage('error', '保存失败：' + error.message);
      } finally {
        saveFileBtn.disabled = false;
        saveFileBtn.textContent = '保存';
      }
    }

    function closeEditor() {
      if (fileContent !== originalContent) {
        if (!confirm('文件未保存，确定要关闭吗？')) {
          return;
        }
      }
      selectedFile = '';
      fileContent = '';
      originalContent = '';
      isEditing = false;
      editorEmptyState.style.display = 'flex';
      editorContent.style.display = 'none';
      renderFileTree();
    }

    function saveGithubToken() {
      const tokenValue = githubTokenInput.value.trim();
      if (!tokenValue) {
        showMessage('error', '请输入 GitHub Token');
        return;
      }
      githubToken = tokenValue;
      localStorage.setItem('github_token', githubToken);
      clearGithubTokenBtn.style.display = 'inline-block';
      tokenStatus.style.display = 'block';
      showMessage('success', 'GitHub Token 已保存');
      loadFiles();
    }

    function clearGithubToken() {
      githubToken = '';
      githubTokenInput.value = '';
      localStorage.removeItem('github_token');
      files = [];
      clearGithubTokenBtn.style.display = 'none';
      tokenStatus.style.display = 'none';
      fileTreeContainer.innerHTML = '<div class="empty-state">点击"刷新"加载文件</div>';
      showMessage('info', 'GitHub Token 已清除');
    }

    function handleLogout() {
      localStorage.removeItem('admin_token');
      localStorage.removeItem('github_token');
      localStorage.removeItem('local_path');
      localStorage.removeItem('file_mode');
      window.location.href = '/admin/login.html';
    }

    function copyToken() {
      navigator.clipboard.writeText(token).then(() => {
        alert('密钥已复制到剪贴板');
      });
    }

    function switchToGithubMode() {
      currentMode = 'github';
      localStorage.setItem('file_mode', 'github');
      location.reload();
    }

    function switchToLocalMode() {
      currentMode = 'local';
      localStorage.setItem('file_mode', 'local');
      location.reload();
    }

    async function loadLocalFiles() {
      if (!localPath) {
        showMessage('error', '请先输入本地项目路径');
        return;
      }

      refreshBtn.disabled = true;
      refreshBtn.textContent = '加载中...';

      try {
        const response = await fetch('http://localhost:3001/api/local-files', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: localPath + '/docs/guide' })
        });

        if (!response.ok) {
          throw new Error('获取文件列表失败，请确保本地 API 服务器正在运行');
        }

        files = await response.json();
        renderFileTree();
        showMessage('success', '本地文件列表加载成功');
      } catch (error) {
        showMessage('error', '加载文件失败：' + error.message);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = '刷新';
      }
    }

    async function openLocalFile(file) {
      if (file.type === 'dir') {
        await loadLocalSubDirectory(file);
        return;
      }

      if (!file.path.endsWith('.md')) {
        showMessage('warning', '只能编辑 Markdown 文件');
        return;
      }

      try {
        const response = await fetch('http://localhost:3001/api/local-file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: localPath + '/docs/guide/' + file.path })
        });

        if (!response.ok) {
          throw new Error('获取文件内容失败');
        }

        const data = await response.json();
        const content = data.content;

        selectedFile = file.path;
        fileContent = content;
        originalContent = content;
        isEditing = true;
        previewMode = false;

        editorFileName.textContent = file.path;
        markdownEditor.value = content;
        editorEmptyState.style.display = 'none';
        editorContent.style.display = 'block';
        markdownEditor.style.display = 'block';
        markdownPreview.style.display = 'none';
        editModeBtn.classList.add('active');
        previewModeBtn.classList.remove('active');

        renderFileTree();
      } catch (error) {
        showMessage('error', '打开文件失败：' + error.message);
      }
    }

    async function loadLocalSubDirectory(dir) {
      if (dir.children) return;

      try {
        const response = await fetch('http://localhost:3001/api/local-files', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: localPath + '/docs/guide/' + dir.path })
        });

        if (response.ok) {
          dir.children = await response.json();
          renderFileTree();
        }
      } catch (error) {
        console.error('加载子目录失败:', error);
      }
    }

    async function saveLocalFile() {
      if (!selectedFile || !localPath) return;

      saveFileBtn.disabled = true;
      saveFileBtn.textContent = '保存中...';

      try {
        const response = await fetch('http://localhost:3001/api/local-file', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            path: localPath + '/docs/guide/' + selectedFile,
            content: fileContent
          })
        });

        if (!response.ok) {
          throw new Error('保存文件失败');
        }

        originalContent = fileContent;
        showMessage('success', '文件保存成功');
      } catch (error) {
        showMessage('error', '保存失败：' + error.message);
      } finally {
        saveFileBtn.disabled = false;
        saveFileBtn.textContent = '保存';
      }
    }

    function saveLocalPath() {
      const pathValue = localPathInput.value.trim();
      if (!pathValue) {
        showMessage('error', '请输入本地项目路径');
        return;
      }
      localPath = pathValue;
      localStorage.setItem('local_path', localPath);
      clearLocalPathBtn.style.display = 'inline-block';
      localStatus.style.display = 'block';
      showMessage('success', '本地路径已保存');
      loadLocalFiles();
    }

    function clearLocalPath() {
      localPath = '';
      localPathInput.value = '';
      localStorage.removeItem('local_path');
      files = [];
      clearLocalPathBtn.style.display = 'none';
      localStatus.style.display = 'none';
      fileTreeContainer.innerHTML = '<div class="empty-state">请输入本地项目路径</div>';
      showMessage('info', '本地路径已清除');
    }

    function togglePreviewMode() {
      previewMode = !previewMode;
      if (previewMode) {
        markdownEditor.style.display = 'none';
        markdownPreview.style.display = 'block';
        previewContent.innerHTML = marked.parse(markdownEditor.value);
        previewModeBtn.classList.add('active');
        editModeBtn.classList.remove('active');
      } else {
        markdownEditor.style.display = 'block';
        markdownPreview.style.display = 'none';
        editModeBtn.classList.add('active');
        previewModeBtn.classList.remove('active');
      }
    }

    copyBtn.addEventListener('click', copyToken);
    logoutBtn.addEventListener('click', handleLogout);
    saveGithubTokenBtn.addEventListener('click', saveGithubToken);
    clearGithubTokenBtn.addEventListener('click', clearGithubToken);
    loadLocalBtn.addEventListener('click', saveLocalPath);
    clearLocalPathBtn.addEventListener('click', clearLocalPath);
    githubModeBtn.addEventListener('click', switchToGithubMode);
    localModeBtn.addEventListener('click', switchToLocalMode);
    refreshBtn.addEventListener('click', () => {
      if (currentMode === 'github') {
        loadFiles();
      } else {
        loadLocalFiles();
      }
    });
    saveFileBtn.addEventListener('click', () => {
      if (currentMode === 'github') {
        saveFile();
      } else {
        saveLocalFile();
      }
    });
    closeEditorBtn.addEventListener('click', closeEditor);
    editModeBtn.addEventListener('click', () => {
      if (previewMode) togglePreviewMode();
    });
    previewModeBtn.addEventListener('click', () => {
      if (!previewMode) togglePreviewMode();
    });
    markdownEditor.addEventListener('input', (e) => {
      fileContent = e.target.value;
    });

    init();
  </script>
</body>
</html>
